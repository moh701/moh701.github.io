# Basic Site Settings
locale                   : "en-US"
site_theme               : "default"
title                    : "Mohammad Mohammadi | AI & Machine Learning Researcher"
title_separator          : "-"
name                     : &name "Mohammad Mohammadi"
description              : &description "AI & Machine Learning Researcher specializing in Healthcare Diagnostics and LLM Security."
url                      : "https://moh701.github.io" 
baseurl                  : "" 
repository               : "moh701/moh701.github.io"

# Site Author
author:
  avatar           : "images/profile.png"
  name             : "Mohammad Mohammadi"
  pronouns         : "he/him"
  bio              : "AI & Machine Learning Researcher focusing on healthcare diagnostics, computer vision, and Large Language Models."
  location         : "Padua, Italy"
  employer         : "University of Padova"
  email            : "mohamadmohammadi741@gmail.com"

  # Academic & Tech profiles
  googlescholar     : "https://scholar.google.com/citations?user=PS_CX0AAAAAJ"
  github            : "moh701"
  linkedin          : "mohammadmohammadi741"

# Publication Category
publication_category:
  books:
    title: 'Books'
  manuscripts:
    title: 'Journal Articles'    
  conferences:
    title: 'Conference Papers'
  patents:
    title: 'Patents and Inventions'

# Footer & Social Sharing
social:
  links:
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/mohammadmohammadi741/"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/moh701"

# Site Settings
teaser                   : 
breadcrumbs              : false
words_per_minute         : 160
future                   : true
read_more                : "disabled"
talkmap_link             : false

# Reading Files
include:
  - .htaccess
  - _pages
  - files
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .github
  - .jekyll-assets-cache
  - .sass-cache
  - assets/js/_main.js
  - assets/js/plugins
  - assets/js/vendor
  - CHANGELOG
  - Gemfile
  - node_modules
  - package.json*
  - README
  - vendor

# Collections
collections:
  teaching:
    output: true
    permalink: /:collection/:path/
  publications:
    output: true
    permalink: /:collection/:path/
  portfolio:
    output: true
    permalink: /:collection/:path/
  talks:
    output: true
    permalink: /:collection/:path/

# Defaults
defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: portfolio
    values:
      layout: single
      author_profile: true
